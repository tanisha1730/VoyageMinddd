name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci
    
    - name: Lint backend code
      working-directory: ./backend
      run: npm run lint
    
    - name: Run backend tests
      working-directory: ./backend
      run: npm test
      env:
        NODE_ENV: test
        MONGO_URI: mongodb://localhost:27017/ai-travel-planner-test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-jwt-secret
        REFRESH_TOKEN_SECRET: test-refresh-secret

  lint-and-test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Lint frontend code
      working-directory: ./frontend
      run: npm run lint
    
    - name: Run frontend tests
      working-directory: ./frontend
      run: npm test

  test-ml-service:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install ML service dependencies
      working-directory: ./ml
      run: |
        pip install -r requirements.txt
        python -m spacy download en_core_web_sm
    
    - name: Run ML service tests
      working-directory: ./ml
      run: pytest tests/
      env:
        ML_SERVICE_SECRET: test-secret

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-test-backend, lint-and-test-frontend, test-ml-service]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Start services with Docker Compose
      run: |
        docker-compose -f docker-compose.yml up -d mongodb redis
        sleep 10
    
    - name: Install and start ML service
      working-directory: ./ml
      run: |
        pip install -r requirements.txt
        python -m spacy download en_core_web_sm
        uvicorn src.main:app --host 0.0.0.0 --port 8001 &
      env:
        ML_SERVICE_SECRET: test-secret
    
    - name: Install and start backend
      working-directory: ./backend
      run: |
        npm ci
        npm start &
      env:
        NODE_ENV: test
        MONGO_URI: mongodb://localhost:27017/ai-travel-planner-test
        REDIS_URL: redis://localhost:6379
        ML_SERVICE_URL: http://localhost:8001
        JWT_SECRET: test-jwt-secret
        REFRESH_TOKEN_SECRET: test-refresh-secret
        ML_SERVICE_SECRET: test-secret
    
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Run E2E tests
      working-directory: ./frontend
      run: npm run test:e2e
      env:
        REACT_APP_API_BASE_URL: http://localhost:3001
    
    - name: Cleanup
      run: docker-compose down

  build-and-push:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ai-travel-planner-backend:latest
    
    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ai-travel-planner-frontend:latest
    
    - name: Build and push ML service image
      uses: docker/build-push-action@v4
      with:
        context: ./ml
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ai-travel-planner-ml:latest